<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOL · 发现你的专属英雄</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Noto+Serif+SC:wght@300;400;700&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #C89B3C;
    --gold-light: #F0E6D3;
    --gold-bright: #F4D480;
    --dark: #010A13;
    --border: rgba(200,155,60,0.3);
    --border-bright: rgba(200,155,60,0.7);
    --text: #A09080;
    --text-bright: #C8AA6E;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--dark);
    color: var(--text-bright);
    font-family: 'Noto Serif SC', serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse at 20% 20%, rgba(200,155,60,0.04) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 80%, rgba(26,58,92,0.15) 0%, transparent 60%),
      repeating-linear-gradient(0deg, transparent, transparent 80px, rgba(200,155,60,0.015) 80px, rgba(200,155,60,0.015) 81px),
      repeating-linear-gradient(90deg, transparent, transparent 80px, rgba(200,155,60,0.015) 80px, rgba(200,155,60,0.015) 81px);
    pointer-events: none; z-index: 0;
  }

  .container { position: relative; z-index: 1; max-width: 820px; margin: 0 auto; padding: 40px 20px 80px; }

  .page { display: none; }
  .page.active { display: block; animation: fadeIn 0.5s ease; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }

  /* header */
  .site-header { text-align: center; margin-bottom: 44px; }
  .logo-line { display: flex; align-items: center; justify-content: center; gap: 16px; margin-bottom: 8px; }
  .logo-divider { flex: 1; max-width: 120px; height: 1px; background: linear-gradient(90deg, transparent, var(--gold), transparent); }
  .logo-icon { font-size: 26px; color: var(--gold); text-shadow: 0 0 20px rgba(200,155,60,0.6); }
  .site-title { font-family: 'Cinzel', serif; font-size: 12px; letter-spacing: 6px; color: var(--gold); }
  .hero-title { font-size: clamp(26px, 5vw, 44px); font-weight: 700; color: var(--gold-light); line-height: 1.2; margin: 14px 0 8px; text-shadow: 0 2px 20px rgba(200,155,60,0.3); }
  .hero-sub { font-size: 13px; color: var(--text); letter-spacing: 2px; }

  /* panel */
  .panel {
    background: linear-gradient(135deg, rgba(13,27,42,0.95), rgba(9,20,40,0.95));
    border: 1px solid var(--border); border-radius: 4px; padding: 28px 32px;
    position: relative; margin-bottom: 20px;
  }
  .panel::before, .panel::after { content: ''; position: absolute; width: 12px; height: 12px; border-color: var(--gold); border-style: solid; }
  .panel::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
  .panel::after  { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

  .section-title { font-size: 12px; color: var(--gold); letter-spacing: 3px; font-family: 'Cinzel', serif; margin-bottom: 14px; text-transform: uppercase; }
  .deco-stars { text-align: center; font-size: 10px; color: var(--border-bright); letter-spacing: 6px; margin: 14px 0; }

  /* role grid */
  .role-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin: 20px 0; }
  @media(max-width:560px){ .role-grid { grid-template-columns: repeat(3,1fr); } }
  .role-btn { background: rgba(10,22,40,0.8); border: 1px solid var(--border); border-radius: 4px; padding: 20px 8px 14px; cursor: pointer; text-align: center; transition: all 0.22s; position: relative; overflow: hidden; }
  .role-btn::before { content: ''; position: absolute; inset: 0; background: linear-gradient(180deg, rgba(200,155,60,0.08), transparent); opacity: 0; transition: opacity 0.22s; }
  .role-btn:hover::before, .role-btn.selected::before { opacity: 1; }
  .role-btn:hover { border-color: var(--gold); transform: translateY(-2px); box-shadow: 0 4px 20px rgba(200,155,60,0.2); }
  .role-btn.selected { border-color: var(--gold-bright); background: rgba(200,155,60,0.12); box-shadow: 0 0 20px rgba(200,155,60,0.25), inset 0 0 20px rgba(200,155,60,0.05); }
  .role-icon { font-size: 28px; display: block; margin-bottom: 8px; }
  .role-name { font-size: 12px; color: var(--text-bright); letter-spacing: 1px; }
  .role-btn.selected .role-name { color: var(--gold-bright); }

  .intro-list { list-style: none; margin: 16px 0; }
  .intro-list li { padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 14px; color: var(--text); display: flex; align-items: center; gap: 10px; }
  .intro-list li::before { content: '◆'; color: var(--gold); font-size: 8px; flex-shrink: 0; }
  .intro-list li:last-child { border-bottom: none; }

  /* progress */
  .progress-wrap { margin-bottom: 24px; }
  .progress-info { display: flex; justify-content: space-between; margin-bottom: 8px; }
  .progress-label { font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: 3px; color: var(--gold); }
  .progress-num { font-size: 12px; color: var(--text); }
  .progress-track { height: 3px; background: rgba(200,155,60,0.1); border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--gold), var(--gold-bright)); border-radius: 2px; transition: width 0.5s cubic-bezier(0.4,0,0.2,1); box-shadow: 0 0 8px rgba(200,155,60,0.5); }

  /* question */
  .part-tag { display: inline-block; font-family: 'Cinzel', serif; font-size: 10px; letter-spacing: 3px; color: var(--gold); border: 1px solid var(--border); padding: 3px 10px; margin-bottom: 12px; background: rgba(200,155,60,0.05); }
  .question-num { font-size: 12px; color: var(--text); margin-bottom: 6px; letter-spacing: 1px; }
  .question-text { font-size: 16px; line-height: 1.85; color: var(--gold-light); margin-bottom: 22px; }

  /* options */
  .options { display: flex; flex-direction: column; gap: 10px; }
  .option-btn {
    background: rgba(10,22,40,0.6); border: 1px solid var(--border); border-radius: 3px;
    padding: 14px 18px; cursor: pointer; text-align: left;
    display: flex; align-items: flex-start; gap: 14px;
    transition: all 0.18s; color: var(--text-bright); font-size: 14px; line-height: 1.6;
    font-family: 'Noto Serif SC', serif; width: 100%;
  }
  .option-label {
    flex-shrink: 0; width: 22px; height: 22px; border: 1px solid var(--border-bright); border-radius: 2px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Cinzel', serif; font-size: 11px; color: var(--gold); transition: all 0.18s; margin-top: 1px;
  }
  .option-btn:hover { border-color: rgba(200,155,60,0.5); background: rgba(200,155,60,0.06); transform: translateX(4px); }
  .option-btn:hover .option-label { background: rgba(200,155,60,0.15); border-color: var(--gold); }
  .option-btn.selected { border-color: var(--gold); background: rgba(200,155,60,0.12); }
  .option-btn.selected .option-label { background: var(--gold); color: var(--dark); border-color: var(--gold-bright); }
  @keyframes optionFlash { 0% { background: rgba(200,155,60,0.3); } 100% { background: rgba(200,155,60,0.12); } }
  .option-btn.flash { animation: optionFlash 0.28s ease; }

  /* nav */
  .nav-row { display: flex; justify-content: flex-start; margin-top: 24px; }
  .btn { font-family: 'Cinzel', serif; font-size: 12px; letter-spacing: 3px; padding: 11px 26px; border: 1px solid; cursor: pointer; transition: all 0.22s; text-transform: uppercase; background: transparent; border-radius: 2px; }
  .btn-primary { color: var(--dark); background: linear-gradient(135deg, var(--gold), #A07830); border-color: var(--gold-bright); box-shadow: 0 0 18px rgba(200,155,60,0.2); }
  .btn-primary:hover { background: linear-gradient(135deg, var(--gold-bright), var(--gold)); box-shadow: 0 0 28px rgba(200,155,60,0.4); transform: translateY(-1px); }
  .btn-secondary { color: var(--text); border-color: var(--border); }
  .btn-secondary:hover { border-color: var(--border-bright); color: var(--text-bright); }
  .btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none !important; }

  /* ===== 结果页 ===== */
  .result-top { text-align: center; padding: 10px 0 24px; }
  .result-label { font-family: 'Noto Serif SC', serif; font-size: 18px; letter-spacing: 5px; color: var(--text); margin-bottom: 10px; }
  .result-champ-name { font-size: clamp(38px, 8vw, 66px); font-weight: 700; color: var(--gold-light); line-height: 1; margin-bottom: 10px; letter-spacing: 4px; text-shadow: 0 0 40px rgba(200,155,60,0.5), 0 2px 0 rgba(0,0,0,0.8); }
  .result-role-tag { display: inline-block; font-family: 'Cinzel', serif; font-size: 10px; letter-spacing: 4px; color: var(--gold); border: 1px solid var(--border); padding: 3px 14px; margin-bottom: 22px; text-transform: uppercase; background: rgba(200,155,60,0.05); }

  /* 原画框 — 横版宽图 */
  .champ-splash-wrap {
    position: relative;
    width: 100%;
    max-width: 600px;
    margin: 0 auto;
  }

  .champ-splash-frame {
    width: 100%;
    aspect-ratio: 16 / 7;
    overflow: hidden;
    border: 1px solid var(--border-bright);
    position: relative;
  }

  /* 四角金线 */
  .champ-splash-frame::before, .champ-splash-frame::after {
    content: ''; position: absolute; width: 20px; height: 20px;
    border-color: var(--gold-bright); border-style: solid; z-index: 3;
  }
  .champ-splash-frame::before { top: -1px; left: -1px; border-width: 3px 0 0 3px; }
  .champ-splash-frame::after  { bottom: -1px; right: -1px; border-width: 0 3px 3px 0; }
  .corner-tr { position: absolute; top: -1px; right: -1px; width: 20px; height: 20px; border-color: var(--gold-bright); border-style: solid; border-width: 3px 3px 0 0; z-index: 3; }
  .corner-bl { position: absolute; bottom: -1px; left: -1px; width: 20px; height: 20px; border-color: var(--gold-bright); border-style: solid; border-width: 0 0 3px 3px; z-index: 3; }

  /* 图片本体 */
  .champ-splash-frame img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
    display: block;
    transition: transform 0.6s ease;
    filter: brightness(0.9) saturate(1.1);
  }

  /* 底部渐变遮罩，让图片融入背景 */
  .champ-splash-frame .splash-fade {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 40%;
    background: linear-gradient(to bottom, transparent, rgba(9,20,40,0.85));
    z-index: 2;
    pointer-events: none;
  }

  /* 内部光晕 */
  .champ-splash-frame .splash-glow {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at center, rgba(200,155,60,0.06), transparent 70%);
    z-index: 1;
    animation: glowPulse 3s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes glowPulse { 0%,100%{opacity:0.5;} 50%{opacity:1;} }

  /* 分割线 */
  .result-divider { display: flex; align-items: center; gap: 12px; margin: 22px 0; }
  .result-divider::before, .result-divider::after { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, transparent, var(--border-bright), transparent); }
  .result-divider-icon { color: var(--gold); font-size: 13px; }

  /* 台词 */
  .quote-wrap { text-align: center; padding: 6px 16px 20px; position: relative; }
  .quote-mark { font-family: Georgia, serif; font-size: 72px; line-height: 0.4; color: rgba(200,155,60,0.12); position: absolute; top: 20px; left: 10px; user-select: none; }
  .quote-text { font-family: 'Ma Shan Zheng', cursive; font-size: clamp(19px, 4vw, 27px); color: var(--gold-light); line-height: 1.75; letter-spacing: 3px; text-shadow: 0 0 30px rgba(200,155,60,0.35); position: relative; z-index: 1; }
  .quote-source { margin-top: 14px; font-size: 12px; color: var(--text); letter-spacing: 3px; font-family: 'Cinzel', serif; }

  /* 解析 */
  .result-desc { font-size: 14px; line-height: 2; color: var(--text); text-align: justify; }

  /* 按钮区 */
  .result-actions { display: flex; justify-content: center; gap: 16px; margin-top: 32px; flex-wrap: wrap; }

  /* Toast */
  .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); background: rgba(13,27,42,0.95); border: 1px solid var(--gold); color: var(--gold-light); padding: 10px 24px; font-size: 13px; border-radius: 3px; transition: transform 0.3s; z-index: 999; box-shadow: 0 4px 20px rgba(200,155,60,0.2); white-space: nowrap; }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="container">

  <!-- 首页 -->
  <div class="page active" id="page-intro">
    <div class="site-header">
      <div class="logo-line"><div class="logo-divider"></div><div class="logo-icon">⚔</div><div class="logo-divider"></div></div>
      <div class="site-title">League of Legends</div>
      <h1 class="hero-title">发现你的专属英雄</h1>
      <p class="hero-sub">32题 · 五大位置 · 80种命运</p>
    </div>

    <div class="panel">
      <div class="section-title">测试说明</div>
      <ul class="intro-list">
        <li>共 32 道题，点击选项即可直接进入下一题</li>
        <li>请根据直觉作答，选最像你的那一个</li>
        <li>根据你选择的位置，匹配你的专属英雄</li>
        <li>测试结束后可以换位置重新查看结果</li>
      </ul>
    </div>

    <div class="deco-stars">✦ ✦ ✦</div>

    <div class="panel">
      <div class="section-title">选择你的位置</div>
      <p style="font-size:13px;color:var(--text);margin-bottom:4px;">决定你的专属英雄</p>
      <div class="role-grid">
        <button class="role-btn" data-role="Top" onclick="selectRole(this)"><span class="role-icon">🛡️</span><span class="role-name">上单</span></button>
        <button class="role-btn" data-role="Jungle" onclick="selectRole(this)"><span class="role-icon">🌲</span><span class="role-name">打野</span></button>
        <button class="role-btn" data-role="Mid" onclick="selectRole(this)"><span class="role-icon">⚡</span><span class="role-name">中单</span></button>
        <button class="role-btn" data-role="ADC" onclick="selectRole(this)"><span class="role-icon">🏹</span><span class="role-name">ADC</span></button>
        <button class="role-btn" data-role="Support" onclick="selectRole(this)"><span class="role-icon">💫</span><span class="role-name">辅助</span></button>
      </div>
    </div>

    <div style="text-align:center;margin-top:28px;">
      <button class="btn btn-primary" onclick="startTest()" id="start-btn" disabled>开始测试</button>
    </div>
  </div>

  <!-- 答题页 -->
  <div class="page" id="page-quiz">
    <div class="site-header" style="margin-bottom:28px;">
      <div class="logo-line"><div class="logo-divider"></div><div class="logo-icon">⚔</div><div class="logo-divider"></div></div>
      <div class="site-title">League of Legends · 发现你的专属英雄</div>
    </div>
    <div class="progress-wrap">
      <div class="progress-info">
        <span class="progress-label" id="part-label">Part 1</span>
        <span class="progress-num" id="progress-text">1 / 32</span>
      </div>
      <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:3.125%"></div></div>
    </div>
    <div class="panel" id="question-panel">
      <div class="part-tag" id="part-tag">Part 1</div>
      <div class="question-num" id="q-num">第 1 题</div>
      <div class="question-text" id="q-text"></div>
      <div class="options" id="q-options"></div>
    </div>
    <div class="nav-row">
      <button class="btn btn-secondary" id="btn-prev" onclick="prevQ()" disabled>← 上一题</button>
    </div>
  </div>

  <!-- 结果页 -->
  <div class="page" id="page-result">
    <div class="site-header" style="margin-bottom:28px;">
      <div class="logo-line"><div class="logo-divider"></div><div class="logo-icon">⚔</div><div class="logo-divider"></div></div>
      <div class="site-title">League of Legends · 你的专属英雄</div>
    </div>

    <div class="panel">
      <div class="result-top">
        <div class="result-label">你的专属英雄</div>
        <div class="result-champ-name" id="res-champion">奥恩</div>
        <div><div class="result-role-tag" id="res-role-badge">上单 · 专属英雄</div></div>

        <!-- 原画框 -->
        <div class="champ-splash-wrap">
          <div class="champ-splash-frame">
            <div class="splash-glow"></div>
            <span class="corner-tr"></span>
            <span class="corner-bl"></span>
            <img id="res-splash" src="" alt="英雄原画">
            <div class="splash-fade"></div>
          </div>
        </div>
      </div>

      <div class="result-divider"><span class="result-divider-icon">◆</span></div>

      <!-- 台词 -->
      <div class="quote-wrap">
        <div class="quote-mark">"</div>
        <div class="quote-text" id="res-quote"></div>
        <div class="quote-source" id="res-champ-tag"></div>
      </div>

      <div class="result-divider"><span class="result-divider-icon">◆</span></div>

      <div class="section-title">英雄解析</div>
      <div class="result-desc" id="res-desc"></div>
    </div>

    <div class="result-actions">
      <button class="btn btn-secondary" onclick="restart()">重新测试</button>
      <button class="btn btn-primary" onclick="changeRole()">换个位置</button>
    </div>
  </div>

</div>
<div class="toast" id="toast"></div>

<script>
// ===== 题目 =====
const questions = [
  {part:"Part 1 · 沟通与社交",text:"你正在打一局排位赛，开局5分钟队伍已经有点劣势，上中两路都在被压。队友开始在聊天框互相抱怨。这时你更可能：",options:["主动在聊天或语音中统一节奏，比如「稳住，等打野6级打龙反一波」","和你认识的队友沟通，让小范围先配合起来","不参与聊天，把注意力全部放在补刀和操作上","观察局势，在关键节点简短说一句「别打」「能守」"]},
  {part:"Part 1 · 沟通与社交",text:"你和朋友开黑，局势比较焦灼，双方经济差不多。语音里有人在不断讲话。这时你通常会：",options:["加入高频讨论，一边打游戏一边不断交流想法","在关键节点发言，比如提醒技能或资源","大部分时间不说话，只专注打游戏","偶尔回应，但更多是在听"]},
  {part:"Part 1 · 沟通与社交",text:"一局游戏刚结束，虽然输了，但其实是可以翻的局。结算界面停留的那几秒，你更可能：",options:["主动指出关键失误，甚至带一点情绪输出","和朋友讨论「刚刚那波如果这样打会不会更好」","直接退出界面准备下一把","心里复盘但不说出来"]},
  {part:"Part 1 · 沟通与社交",text:"中期即将爆发一波关键团战，双方在龙坑附近拉扯。此时你更可能：",options:["主动提醒队友站位、技能CD、开团时机","根据队友的交流做出配合","几乎不说话，只专注操作","等关键瞬间说一句「可以打」"]},
  {part:"Part 1 · 沟通与社交",text:"你的一次操作失误被队友点出来（比如空大/走位失误），你第一反应是：",options:["直接回应甚至反驳对方","解释一下自己的思路","完全不回应","看对方语气决定是否回复"]},
  {part:"Part 1 · 沟通与社交",text:"当你打出一波漂亮操作（比如1v2反杀）时，你更倾向：",options:["主动在聊天或语音里表达出来甚至带点炫耀","和队友简单分享一下","不说话继续打","只有别人提起才回应"]},
  {part:"Part 1 · 沟通与社交",text:"当你在优势局时，队伍有机会一波结束比赛，你更可能：",options:["主动指挥推进路线和节奏","跟着团队一起推进","更倾向自己去单带扩大优势","选择更稳的打法等待机会"]},
  {part:"Part 1 · 沟通与社交",text:"如果整局游戏都没有人说话，你通常会：",options:["主动开口带动沟通","偶尔发信息","完全不说话","只在关键点说"]},

// ===== 状态 =====
let currentQ = 0;
let answers = new Array(32).fill(null);
let selectedRole = null;

function selectRole(btn) {
  document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selectedRole = btn.dataset.role;
  document.getElementById('start-btn').disabled = false;
}

function startTest() {
  showPage('page-quiz');
  renderQuestion();
}

function renderQuestion() {
  const q = questions[currentQ];
  const panel = document.getElementById('question-panel');
  panel.style.opacity = '0';
  panel.style.transform = 'translateY(10px)';
  setTimeout(() => {
    document.getElementById('part-tag').textContent = q.part;
    document.getElementById('q-num').textContent = `第 ${currentQ + 1} 题`;
    document.getElementById('q-text').textContent = q.text;
    const opts = document.getElementById('q-options');
    opts.innerHTML = '';
    ['A','B','C','D'].forEach((lbl, i) => {
      const btn = document.createElement('button');
      btn.className = 'option-btn' + (answers[currentQ] === i ? ' selected' : '');
      btn.innerHTML = `<span class="option-label">${lbl}</span><span>${q.options[i]}</span>`;
      btn.onclick = () => chooseAndNext(i);
      opts.appendChild(btn);
    });
    const pct = ((currentQ + 1) / 32 * 100).toFixed(1);
    document.getElementById('progress-fill').style.width = pct + '%';
    document.getElementById('progress-text').textContent = `${currentQ + 1} / 32`;
    const partNames = ['Part 1 · 沟通与社交','Part 2 · 信息处理','Part 3 · 决策情绪','Part 4 · 节奏规划'];
    document.getElementById('part-label').textContent = partNames[Math.floor(currentQ / 8)];
    document.getElementById('btn-prev').disabled = currentQ === 0;
    panel.style.transition = 'opacity 0.3s, transform 0.3s';
    panel.style.opacity = '1';
    panel.style.transform = 'translateY(0)';
  }, 120);
}

function chooseAndNext(idx) {
  answers[currentQ] = idx;
  document.querySelectorAll('.option-btn').forEach((b, i) => {
    b.classList.toggle('selected', i === idx);
    if (i === idx) b.classList.add('flash');
  });
  setTimeout(() => {
    if (currentQ < 31) { currentQ++; renderQuestion(); }
    else showResult();
  }, 280);
}

function prevQ() {
  if (currentQ > 0) { currentQ--; renderQuestion(); }
}

function calcMBTI() {
  let ei=0, sn=0, tf=0, jp=0;
  for(let i=0;i<8;i++)  ei += answers[i]!==null ? scoreMap[answers[i]] : 0;
  for(let i=8;i<16;i++) sn += answers[i]!==null ? scoreMap[answers[i]] : 0;
  for(let i=16;i<24;i++) tf += answers[i]!==null ? scoreMap[answers[i]] : 0;
  for(let i=24;i<32;i++) jp += answers[i]!==null ? scoreMap[answers[i]] : 0;
  return (ei>=0?'E':'I') + (sn>=0?'S':'N') + (tf>=0?'T':'F') + (jp>=0?'J':'P');
}

function showResult() {
  const type = calcMBTI();
  const d = champions[type][selectedRole];
  const roleNames = { Top:'上单', Jungle:'打野', Mid:'中单', ADC:'ADC', Support:'辅助' };

  document.getElementById('res-champion').textContent = d.hero;
  document.getElementById('res-role-badge').textContent = roleNames[selectedRole] + ' · 专属英雄';
  document.getElementById('res-splash').src = d.img;
  document.getElementById('res-splash').alt = d.hero + ' 原画';
  document.getElementById('res-quote').textContent = d.quote;
  document.getElementById('res-champ-tag').textContent = '— ' + d.hero;
  document.getElementById('res-desc').textContent = d.desc;

  showPage('page-result');
}

function restart() {
  answers = new Array(32).fill(null);
  currentQ = 0;
  selectedRole = null;
  document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('selected'));
  document.getElementById('start-btn').disabled = true;
  showPage('page-intro');
}

function changeRole() {
  document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('selected'));
  document.getElementById('start-btn').disabled = true;
  showPage('page-intro');
}

function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo({ top:0, behavior:'smooth' });
}
